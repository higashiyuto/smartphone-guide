<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スマートフォン図鑑</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 h-[100dvh] flex flex-col overflow-hidden overscroll-none selection:bg-blue-200">

  <header class="bg-white/80 backdrop-blur-md border-b border-slate-200/60 shadow-sm relative z-50 shrink-0">
    <div class="max-w-5xl mx-auto px-4 md:px-6 py-4 landscape:py-2 flex justify-between items-center">
      <h1 class="text-2xl landscape:text-xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent tracking-tight">📱 スマホ図鑑</h1>
      
      <div class="flex gap-2">
        <button id="compare-btn" class="text-slate-500 hover:text-indigo-600 font-medium px-3 md:px-4 py-2 landscape:py-1 bg-slate-100 hover:bg-indigo-50 rounded-full transition-all text-sm">
          <svg class="w-4 h-4 md:w-5 md:h-5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
          <span class="hidden sm:inline">比較モード</span><span class="sm:hidden">比較</span>
        </button>
  
        <button id="search-btn" class="flex items-center gap-1.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-4 md:px-6 py-2 md:py-2.5 landscape:py-1 rounded-full transition-all duration-300 shadow-md font-medium text-sm md:text-base active:scale-95">
          <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          探す
        </button>
      </div>
    </div>

    <div id="dropdown-menu" class="absolute top-full left-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 shadow-2xl rounded-b-2xl overflow-hidden transition-all duration-400 ease-in-out max-h-0 opacity-0 pointer-events-none">
      <div class="max-w-5xl mx-auto p-4 md:p-8 landscape:p-4 landscape:max-h-[60vh] overflow-y-auto">
        <div id="menu-nav" class="hidden flex items-center mb-4 md:mb-6 border-b border-slate-100 pb-3 md:pb-4">
          <button id="menu-back-btn" class="flex items-center gap-1 text-slate-500 hover:text-indigo-600 transition-colors font-medium px-2 py-1 rounded-lg hover:bg-indigo-50 text-sm md:text-base">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            戻る
          </button>
          <span id="menu-title" class="ml-3 md:ml-4 font-bold text-slate-800 text-base md:text-lg tracking-wide"></span>
        </div>
        <div id="menu-content" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 md:gap-4"></div>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto w-full p-2 md:p-6 landscape:p-2 flex-1 flex flex-col overflow-hidden">
    <div id="welcome-message" class="flex flex-col items-center justify-center h-full text-slate-400 animate-pulse">
      <svg class="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
      <p class="text-lg md:text-xl font-medium tracking-wide">右上の「探す」から端末を選択</p>
    </div>

    <div id="portrait-warning" class="hidden landscape:hidden fixed inset-0 z-[100] bg-slate-900/95 flex flex-col items-center justify-center text-white backdrop-blur-sm">
      <svg class="w-16 h-16 mb-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      <p class="text-xl font-bold tracking-wide">端末を横向きにしてください</p>
      <p class="text-slate-400 mt-2">比較モードは横画面（ランドスケープ）専用です🔄</p>
      <button id="close-compare-btn" class="mt-8 px-6 py-2 bg-white/10 rounded-full hover:bg-white/20 transition-colors">比較モードをやめる</button>
    </div>

    <div id="compare-container" class="hidden flex-1 h-full w-full flex gap-2 md:gap-4 overflow-hidden animate-[fadeIn_0.5s_ease-out]">
      <div class="w-1/2 flex flex-col border border-slate-200 bg-white rounded-xl md:rounded-2xl overflow-hidden shadow-sm relative">
        <button id="search-left-btn" class="absolute top-2 right-2 z-20 bg-indigo-600 text-white px-3 py-1 rounded-full text-xs md:text-sm font-medium shadow-md">左を変更</button>
        <div class="h-40 landscape:h-20 bg-slate-50 flex justify-center items-center p-2 shrink-0 border-b border-slate-100">
          <img id="compare-image-left" src="" class="max-h-full object-contain">
        </div>
        <div class="p-2 md:p-3 bg-white shrink-0 border-b border-slate-100">
          <h2 id="compare-name-left" class="text-sm md:text-lg font-bold text-slate-800 text-center truncate">未選択</h2>
        </div>
        <div class="flex-1 overflow-y-auto overscroll-contain">
          <table class="w-full text-xs text-left"><tbody id="compare-specs-left" class="divide-y divide-slate-100"></tbody></table>
        </div>
      </div>

      <div class="w-1/2 flex flex-col border border-slate-200 bg-white rounded-xl md:rounded-2xl overflow-hidden shadow-sm relative">
        <button id="search-right-btn" class="absolute top-2 right-2 z-20 bg-indigo-600 text-white px-3 py-1 rounded-full text-xs md:text-sm font-medium shadow-md">右を変更</button>
        <div class="h-40 landscape:h-20 bg-slate-50 flex justify-center items-center p-2 shrink-0 border-b border-slate-100">
          <img id="compare-image-right" src="" class="max-h-full object-contain">
        </div>
        <div class="p-2 md:p-3 bg-white shrink-0 border-b border-slate-100">
          <h2 id="compare-name-right" class="text-sm md:text-lg font-bold text-slate-800 text-center truncate">未選択</h2>
        </div>
        <div class="flex-1 overflow-y-auto overscroll-contain">
          <table class="w-full text-xs text-left"><tbody id="compare-specs-right" class="divide-y divide-slate-100"></tbody></table>
        </div>
      </div>
    </div>

    <div id="detail-box" class="hidden flex-1 h-full w-full flex-col md:flex-row gap-4 md:gap-8 overflow-hidden animate-[fadeIn_0.5s_ease-out]">
      <div class="md:w-1/2 flex flex-col gap-3 md:gap-6">
        <div class="relative bg-gradient-to-br from-slate-100 to-slate-200 rounded-3xl flex justify-center items-center p-4 md:p-8 h-48 md:h-80 shrink-0 shadow-inner overflow-hidden group">
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.8)_0%,transparent_100%)]"></div>
          <img id="phone-image" src="" alt="スマホ画像" class="max-h-full object-contain relative z-10 drop-shadow-2xl transition-transform duration-500 group-hover:scale-105">
        </div>
        
        <div class="px-2 shrink-0">
          <h2 id="selected-name" class="text-2xl md:text-4xl font-black bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent tracking-tight"></h2>
          <div class="mt-2 md:mt-5 flex items-center gap-4">
            <h3 class="font-bold text-slate-500 text-xs md:text-sm uppercase tracking-wider">Color</h3>
            <span id="current-color-name" class="font-medium text-slate-800 bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100 text-xs md:text-sm"></span>
          </div>
          <div id="color-options" class="flex gap-2 md:gap-3 mt-2 md:mt-3 ml-1"></div>
        </div>
      </div>

      <div class="md:w-1/2 flex flex-col overflow-hidden pb-2">
        <h3 class="font-bold text-slate-500 mb-2 text-xs md:text-sm uppercase tracking-wider pl-1 shrink-0">Specifications</h3>
        <div class="flex-1 overflow-y-auto overscroll-contain border border-slate-200/60 rounded-2xl bg-white shadow-sm ring-1 ring-slate-900/5">
          <table class="w-full text-sm text-left">
            <tbody id="selected-specs" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
