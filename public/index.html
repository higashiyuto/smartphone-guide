<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマートフォン図鑑</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <header class="bg-white shadow-md relative z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-800">📱 スマホ図鑑</h1>
      <button id="search-btn" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full transition font-semibold shadow-sm">
        商品を探す
      </button>
    </div>

    <div id="dropdown-menu" class="absolute top-full left-0 w-full bg-white border-t shadow-xl overflow-hidden transition-all duration-300 max-h-0 opacity-0">
      <div class="max-w-5xl mx-auto p-4 md:p-6">
        <div id="menu-nav" class="hidden flex items-center mb-4 border-b pb-3">
          <button id="menu-back-btn" class="flex items-center gap-1 text-gray-500 hover:text-blue-600 transition font-medium px-2 py-1 rounded-md hover:bg-gray-100">戻る</button>
          <span id="menu-title" class="ml-4 font-bold text-gray-800 text-lg"></span>
        </div>
        <div id="menu-content" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-4 md:p-6 mt-4">
    <div id="welcome-message" class="text-center text-gray-400 mt-20">
      <p class="text-xl font-medium">右上の「商品を探す」ボタンから端末を選択してください</p>
    </div>

    <div id="detail-box" class="hidden h-[calc(100vh-140px)] flex flex-col md:flex-row gap-6 overflow-hidden">
      <div class="md:w-1/2 flex flex-col gap-4">
        <div class="bg-gray-50 rounded-xl flex justify-center items-center p-4 h-64 md:h-80 shrink-0">
          <img id="phone-image" src="" alt="スマホ画像" class="max-h-full object-contain">
        </div>
        <div>
          <h2 id="selected-name" class="text-3xl font-extrabold text-blue-600"></h2>
          <h3 class="font-bold mt-4 text-gray-700">カラー: <span id="current-color-name" class="font-normal"></span></h3>
          <div id="color-options" class="flex gap-3 mt-2"></div>
        </div>
      </div>

      <div class="md:w-1/2 flex flex-col overflow-hidden">
        <h3 class="font-bold text-gray-700 mb-2">スペック:</h3>
        <div class="flex-1 overflow-y-auto border rounded-lg bg-white shadow-sm">
          <table class="w-full text-sm text-left">
            <tbody id="selected-specs" class="divide-y"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
