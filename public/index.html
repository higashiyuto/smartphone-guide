<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スマートフォン図鑑</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden overscroll-none selection:bg-blue-200">

  <header class="bg-white/80 backdrop-blur-md border-b border-slate-200/60 shadow-sm relative z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent tracking-tight">📱 スマホ図鑑</h1>
      
      <button id="search-btn" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-6 py-2.5 rounded-full transition-all duration-300 shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 font-medium active:scale-95">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        商品を探す
      </button>
    </div>

    <div id="dropdown-menu" class="absolute top-full left-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 shadow-2xl rounded-b-2xl overflow-hidden transition-all duration-400 ease-in-out max-h-0 opacity-0">
      <div class="max-w-5xl mx-auto p-5 md:p-8">
        <div id="menu-nav" class="hidden flex items-center mb-6 border-b border-slate-100 pb-4">
          <button id="menu-back-btn" class="flex items-center gap-1.5 text-slate-500 hover:text-indigo-600 transition-colors font-medium px-3 py-1.5 rounded-lg hover:bg-indigo-50">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            戻る
          </button>
          <span id="menu-title" class="ml-4 font-bold text-slate-800 text-lg tracking-wide"></span>
        </div>
        <div id="menu-content" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-4 md:p-6 mt-2">
    <div id="welcome-message" class="flex flex-col items-center justify-center h-[60vh] text-slate-400 animate-pulse">
      <svg class="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
      <p class="text-xl font-medium tracking-wide">右上の「商品を探す」から端末を選択</p>
    </div>

    <div id="detail-box" class="hidden h-[calc(100vh-130px)] flex flex-col md:flex-row gap-4 md:gap-8 overflow-hidden animate-[fadeIn_0.5s_ease-out]">
      
      <div class="md:w-1/2 flex flex-col gap-3 md:gap-6">
        <div class="relative bg-gradient-to-br from-slate-100 to-slate-200 rounded-3xl flex justify-center items-center p-4 md:p-8 h-44 md:h-80 shrink-0 shadow-inner overflow-hidden group">
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.8)_0%,transparent_100%)]"></div>
          <img id="phone-image" src="" alt="スマホ画像" class="max-h-full object-contain relative z-10 drop-shadow-2xl transition-transform duration-500 group-hover:scale-105">
        </div>
        
        <div class="px-2">
          <h2 id="selected-name" class="text-3xl md:text-4xl font-black bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent tracking-tight"></h2>
          <div class="mt-3 md:mt-5 flex items-center gap-4">
            <h3 class="font-bold text-slate-500 text-xs md:text-sm uppercase tracking-wider">Color</h3>
            <span id="current-color-name" class="font-medium text-slate-800 bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100 text-sm"></span>
          </div>
          <div id="color-options" class="flex gap-3 mt-2 md:mt-3 ml-1"></div>
        </div>
      </div>

      <div class="md:w-1/2 flex flex-col overflow-hidden pb-4">
        <h3 class="font-bold text-slate-500 mb-2 md:mb-3 text-xs md:text-sm uppercase tracking-wider pl-1">Specifications</h3>
        <div class="flex-1 overflow-y-auto overscroll-contain border border-slate-200/60 rounded-2xl bg-white shadow-sm ring-1 ring-slate-900/5">
          <table class="w-full text-sm text-left">
            <tbody id="selected-specs" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
